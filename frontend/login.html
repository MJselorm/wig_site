<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WIGS Princess Series</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="split-login-body">
    <div class="split-login-wrapper">
        <div class="split-login-container">
            
            <!-- Left Panel -->
            <div class="split-left">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>
                
                <div class="split-left-content">
                    <h1 class="welcome-heading">Welcome to</h1>
                    <div class="split-logo">
                        <div class="logo-circle">
                            <i class="fas fa-crown"></i>
                        </div>
                        <h2>Princess Series</h2>
                    </div>
                    <p class="split-description">Discover our premium collection of human hair and synthetic wigs designed to make you feel like royalty.</p>
                </div>
                
                <div class="creator-tags">
                    <span>DESIGNED FOR YOU</span> | <span>PREMIUM QUALITY</span>
                </div>

                <!-- CSS Cloud Edge -->
                <div class="cloud-border-1"></div>
                <div class="cloud-border-2"></div>
                <div class="cloud-border-main"></div>
            </div>

            <!-- Right Panel -->
            <div class="split-right">
                <div class="form-container">
                    <h2 class="form-title" id="auth-title">Create your account</h2>
                    
                        <form id="auth-form" class="split-form">
                        
                        <div class="split-input-group">
                            <label>E-mail Address</label>
                            <div class="input-wrapper">
                                <input type="email" id="email" required placeholder="Enter your mail">
                                <i class="fas fa-check check-icon"></i>
                            </div>
                        </div>
                        
                        <div class="split-input-group">
                            <label>Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="password" required placeholder="Enter your password">
                                <i class="fas fa-check check-icon"></i>
                            </div>
                        </div>
                        
                        <div class="terms-group" id="terms-group">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">By Signing Up, I Agree with <span>Terms & Conditions</span></label>
                        </div>
                        
                        <div class="split-form-actions">
                            <button type="submit" class="split-btn primary-btn" id="auth-submit-btn">Sign Up</button>
                            <button type="button" class="split-btn secondary-btn" id="toggle-mode-btn">Sign In</button>
                        </div>
                        
                        <p id="error-message" class="error-message"></p>
                    </form>
                </div>
            </div>
            
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
